<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electronic Layout</title>

<style>

/*center canvas*/
body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/*svg background color*/
svg{
    background:black;
}

/*color palette*/
.blue { stroke: #2f8cff; }
.pink { stroke: #ff006e; }
.green { stroke: #a7ff0f; }
.yellow { stroke: #ffd60a; }
.whiteLine { stroke: #ffffff; }

</style>
</head>

<body>

<!-- create SVG -->
<svg id="art" width="210mm" height="297mm" viewBox="0 0 210 297"></svg>

<script>

//set up the SVG 
const NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("art");

//width and height we are working with 
const VIEW_WIDTH = 210;
const VIEW_HEIGHT = 297;

//number of columns
const COLS = 25;

//size of each tile so it can fit the dimensions 
const TILE = VIEW_WIDTH / COLS;

//tiles that can fit the rows based on the height dimensions 
const ROWS = Math.floor(VIEW_HEIGHT / TILE);

//roation angles and colors 
const rotations = [0,90,180,270];
const COLORS = ["blue","pink","green","yellow"];

//helper transform functions 
function translate(x,y){
    return `translate(${x},${y})`;
}

function rotate(a){
    return `rotate(${a})`;
}

//creates a string of transforms each having a space after it 
//basically allows multiple transforms to be applied 
//... notation means this funtion can take any
//number of paramaters (transforms)
function compose(...t){
    return t.join(" ");
}

//create a tile 
function createTile(){

    //create the g element with an id of tile 
    const g = document.createElementNS(NS,"g");
    g.setAttribute("id","tile");

    const tileSize = TILE;

    //thick stroke should be 8 percent of the tiles size 
    const thickStroke = tileSize * 0.08;
    //medium stroke should be 4 percent of the tiles size 
    const mediumStroke = tileSize * 0.04;

    //outer white frame
    const frame = document.createElementNS(NS,"rect");
    frame.setAttribute("x", tileSize * 0.1);
    frame.setAttribute("y", tileSize * 0.1);
    frame.setAttribute("width", tileSize * 0.8);
    frame.setAttribute("height", tileSize * 0.8);
    frame.setAttribute("stroke-width", mediumStroke);
    //if we comment this out the frame becomes the color of the shapes
    frame.setAttribute("class","whiteLine");
    frame.setAttribute("fill","none");
    g.appendChild(frame);

    //vertical thick rectangle 
    const verticalBar = document.createElementNS(NS,"rect");
    verticalBar.setAttribute("x", tileSize * 0.2);
    verticalBar.setAttribute("y", tileSize * 0.2);
    verticalBar.setAttribute("width", tileSize * 0.15);
    verticalBar.setAttribute("height", tileSize * 0.6);
    verticalBar.setAttribute("stroke-width", thickStroke);
    verticalBar.setAttribute("fill","none");
    g.appendChild(verticalBar);

    //horizontal thin rectangle 
    const horizontalBar = document.createElementNS(NS,"rect");
    horizontalBar.setAttribute("x", tileSize * 0.4);
    horizontalBar.setAttribute("y", tileSize * 0.5);
    horizontalBar.setAttribute("width", tileSize * 0.4);
    horizontalBar.setAttribute("height", tileSize * 0.12);
    horizontalBar.setAttribute("stroke-width", mediumStroke);
    horizontalBar.setAttribute("fill","none");
    g.appendChild(horizontalBar);

    //thicker corner square 
    const cornerSquare = document.createElementNS(NS,"rect");
    cornerSquare.setAttribute("x", tileSize * 0.7);
    cornerSquare.setAttribute("y", tileSize * 0.7);
    cornerSquare.setAttribute("width", tileSize * 0.2);
    cornerSquare.setAttribute("height", tileSize * 0.2);
    cornerSquare.setAttribute("stroke-width", thickStroke);
    cornerSquare.setAttribute("fill","none");

    g.appendChild(cornerSquare);

    return g;
}

//store tile template inside SVG blueprint container 
const tileBluePrint = document.createElementNS(NS,"defs");

//append the tile creation function
tileBluePrint.appendChild(createTile());

//attach blueprint storage to SVG canvas
svg.appendChild(tileBluePrint);

//create the whole image 
for(let r = 0; r < ROWS; r++){

    for(let c = 0; c < COLS; c++){

        //create a tile instance from the blueprint template 
        const use = document.createElementNS(NS,"use");

        //rotate the tile we just created 
        const rotation = rotations[(c * r + r) % rotations.length];

        //pick a color for the tile 
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];

        //reference the tile blueprint from the storage (the SVG defs) 
        use.setAttribute("href","#tile");

        //apply the colors
        use.setAttribute("class",color);

        //we attach the transforms for the tile 
        use.setAttribute(
            "transform",
            compose(
                translate(c * TILE, r * TILE),
                rotate(rotation + " " + TILE / 2 + " " + TILE / 2)
            )
        );

        //append the tile to the SVG 
        svg.appendChild(use);
    }
}

</script>

</body>
</html>
